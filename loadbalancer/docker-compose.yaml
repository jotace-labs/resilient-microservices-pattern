---
version: '3'

volumes:
  grafana-data:
    driver: local

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-lb
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      # - prometheus:/prometheus # left is host path, right is container path
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # allows prometheus to access the load balancer running on the host machine
    # network_mode: "host"
    command:  
      - "--config.file=/etc/prometheus/prometheus.yaml"
  

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-lb
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/grafana.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    # network_mode: "host"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password

